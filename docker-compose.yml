services:
  whisper:
    build:
      context: .
      dockerfile: docker/whisper/Dockerfile
      args:
        GPU_BACKEND: ${GPU_BACKEND:-cuda}
    image: forensic-rag/whisper:${GPU_BACKEND:-cuda}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      HF_TOKEN: ${HF_TOKEN}
    volumes:
      - ./data:/data
      - ./models/hf_cache:/app/model_cache
      - ./models/whisper_cache:/app/whisper_cache
      - ./src/transcription:/app/transcription
    profiles:
      - tools
